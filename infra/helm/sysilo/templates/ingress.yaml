{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "sysilo.fullname" . }}
  labels:
    {{- include "sysilo.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          {{- if .Values.frontend.enabled }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "sysilo.fullname" . }}-frontend
                port:
                  number: {{ .Values.frontend.port }}
          {{- end }}
          {{- if .Values.apiGateway.enabled }}
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "sysilo.fullname" . }}-api-gateway
                port:
                  number: {{ .Values.apiGateway.port }}
          {{- end }}
          {{- if .Values.opsService.enabled }}
          - path: /ops
            pathType: Prefix
            backend:
              service:
                name: {{ include "sysilo.fullname" . }}-ops-service
                port:
                  number: {{ .Values.opsService.port }}
          {{- end }}
          {{- if .Values.governanceService.enabled }}
          - path: /governance
            pathType: Prefix
            backend:
              service:
                name: {{ include "sysilo.fullname" . }}-governance-service
                port:
                  number: {{ .Values.governanceService.port }}
          {{- end }}
          {{- if .Values.rationalizationService.enabled }}
          - path: /rationalization
            pathType: Prefix
            backend:
              service:
                name: {{ include "sysilo.fullname" . }}-rationalization-service
                port:
                  number: {{ .Values.rationalizationService.port }}
          {{- end }}
          {{- if .Values.assetService.enabled }}
          - path: /assets
            pathType: Prefix
            backend:
              service:
                name: {{ include "sysilo.fullname" . }}-asset-service
                port:
                  number: {{ .Values.assetService.port }}
          {{- end }}
{{- end }}
