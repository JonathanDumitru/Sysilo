{{- if .Values.integrationService.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sysilo.fullname" . }}-integration-service
  labels:
    {{- include "sysilo.labels" . | nindent 4 }}
    app.kubernetes.io/component: integration-service
spec:
  replicas: {{ .Values.integrationService.replicas }}
  selector:
    matchLabels:
      {{- include "sysilo.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: integration-service
  template:
    metadata:
      labels:
        {{- include "sysilo.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: integration-service
      annotations:
        {{- include "sysilo.prometheusAnnotations" . | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: integration-service
          image: {{ include "sysilo.image" (dict "global" .Values.global "image" .Values.integrationService.image "tag" .Values.integrationService.tag) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.integrationService.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.integrationService.resources | nindent 12 }}
          env:
            {{- range $key, $value := .Values.integrationService.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "sysilo.fullname" . }}-secrets
                  key: database-url
          volumeMounts:
            - name: config
              mountPath: /etc/sysilo
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: {{ include "sysilo.fullname" . }}-config
{{- end }}
