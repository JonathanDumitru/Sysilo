apiVersion: v1
kind: Secret
metadata:
  name: {{ include "sysilo.fullname" . }}-secrets
  labels:
    {{- include "sysilo.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Database connection URLs - values injected at deploy time
  {{- if .Values.postgresql.external.enabled }}
  database-url: "postgresql://{{ .Values.postgresql.external.username }}:$(POSTGRES_PASSWORD)@{{ .Values.postgresql.external.host }}:{{ .Values.postgresql.external.port }}/{{ .Values.postgresql.external.database }}"
  {{- else if .Values.postgresql.enabled }}
  database-url: "postgresql://{{ .Values.postgresql.auth.username }}:{{ .Values.postgresql.auth.password }}@{{ include "sysilo.fullname" . }}-postgresql:5432/{{ .Values.postgresql.auth.database }}"
  {{- end }}

  {{- if .Values.neo4j.external.enabled }}
  neo4j-url: "bolt://{{ .Values.neo4j.external.host }}:{{ .Values.neo4j.external.port }}"
  neo4j-username: {{ .Values.neo4j.external.username | quote }}
  {{- else if .Values.neo4j.enabled }}
  neo4j-url: "bolt://{{ include "sysilo.fullname" . }}-neo4j:7687"
  neo4j-username: {{ .Values.neo4j.auth.username | quote }}
  neo4j-password: {{ .Values.neo4j.auth.password | quote }}
  {{- end }}

  {{- if .Values.redis.external.enabled }}
  redis-password: ""
  {{- else if .Values.redis.enabled }}
  redis-password: {{ .Values.redis.auth.password | quote }}
  {{- end }}

  {{- if .Values.minio.external.enabled }}
  minio-endpoint: {{ .Values.minio.external.endpoint | quote }}
  minio-access-key: {{ .Values.minio.external.accessKey | quote }}
  {{- else if .Values.minio.enabled }}
  minio-endpoint: "http://{{ include "sysilo.fullname" . }}-minio:9000"
  minio-access-key: {{ .Values.minio.auth.rootUser | quote }}
  minio-secret-key: {{ .Values.minio.auth.rootPassword | quote }}
  {{- end }}
