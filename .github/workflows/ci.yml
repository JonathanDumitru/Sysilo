name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.22"
  RUST_VERSION: "stable"
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.11"

jobs:
  # ==========================
  # Lint Jobs
  # ==========================

  lint-go:
    name: Lint Go
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module:
          - agent
          - services/agent-gateway
          - services/api-gateway
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ matrix.module }}/go.sum

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          working-directory: ${{ matrix.module }}
          version: latest

  lint-rust:
    name: Lint Rust (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - integration-service
          - data-service
          - asset-service
          - ops-service
          - governance-service
          - rationalization-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            services/${{ matrix.service }}/target
          key: rust-${{ matrix.service }}-${{ hashFiles(format('services/{0}/Cargo.lock', matrix.service)) }}
          restore-keys: |
            rust-${{ matrix.service }}-

      - name: Run clippy
        working-directory: services/${{ matrix.service }}
        run: cargo clippy -- -D warnings

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: packages/frontend/web-app/package-lock.json

      - name: Install dependencies
        working-directory: packages/frontend/web-app
        run: npm ci

      - name: Run ESLint
        working-directory: packages/frontend/web-app
        run: npm run lint

      - name: TypeScript type check
        working-directory: packages/frontend/web-app
        run: npx tsc --noEmit

  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dev dependencies
        working-directory: services/ai-service
        run: pip install ruff mypy

      - name: Run ruff
        working-directory: services/ai-service
        run: ruff check src/

      - name: Run ruff format check
        working-directory: services/ai-service
        run: ruff format --check src/

  # ==========================
  # Test Jobs
  # ==========================

  test-go:
    name: Test Go
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module:
          - agent
          - services/agent-gateway
          - services/api-gateway
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ matrix.module }}/go.sum

      - name: Run tests
        working-directory: ${{ matrix.module }}
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-go-${{ hashFiles(matrix.module) }}
          path: ${{ matrix.module }}/coverage.out

  test-rust:
    name: Test Rust (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - integration-service
          - data-service
          - asset-service
          - ops-service
          - governance-service
          - rationalization-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            services/${{ matrix.service }}/target
          key: rust-${{ matrix.service }}-${{ hashFiles(format('services/{0}/Cargo.lock', matrix.service)) }}
          restore-keys: |
            rust-${{ matrix.service }}-

      - name: Run tests
        working-directory: services/${{ matrix.service }}
        run: cargo test

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: packages/frontend/web-app/package-lock.json

      - name: Install dependencies
        working-directory: packages/frontend/web-app
        run: npm ci

      - name: Run tests
        working-directory: packages/frontend/web-app
        run: npx vitest run

  test-python:
    name: Test Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: services/ai-service
        run: pip install -e ".[dev]"

      - name: Run tests
        working-directory: services/ai-service
        run: pytest --cov=src --cov-report=xml

  # ==========================
  # Build Jobs
  # ==========================

  build-go:
    name: Build Go
    runs-on: ubuntu-latest
    needs: [lint-go, test-go]
    strategy:
      matrix:
        include:
          - module: agent
            binary: agent
            build_path: ./cmd/agent
          - module: services/agent-gateway
            binary: agent-gateway
            build_path: ./cmd/agent-gateway
          - module: services/api-gateway
            binary: api-gateway
            build_path: ./cmd/api-gateway
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ matrix.module }}/go.sum

      - name: Build binary
        working-directory: ${{ matrix.module }}
        run: |
          CGO_ENABLED=0 go build -ldflags="-s -w" -o ${{ matrix.binary }} ${{ matrix.build_path }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.module }}/${{ matrix.binary }}

  build-rust:
    name: Build Rust (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [lint-rust, test-rust]
    strategy:
      matrix:
        service:
          - integration-service
          - data-service
          - asset-service
          - ops-service
          - governance-service
          - rationalization-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            services/${{ matrix.service }}/target
          key: rust-${{ matrix.service }}-${{ hashFiles(format('services/{0}/Cargo.lock', matrix.service)) }}
          restore-keys: |
            rust-${{ matrix.service }}-

      - name: Build release binary
        working-directory: services/${{ matrix.service }}
        run: cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}
          path: services/${{ matrix.service }}/target/release/${{ matrix.service }}

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: [lint-frontend, test-frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: packages/frontend/web-app/package-lock.json

      - name: Install dependencies
        working-directory: packages/frontend/web-app
        run: npm ci

      - name: Build
        working-directory: packages/frontend/web-app
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-app-dist
          path: packages/frontend/web-app/dist

  # ==========================
  # Security Scan
  # ==========================

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Go vulnerability check - agent
        working-directory: agent
        run: govulncheck ./...

      - name: Go vulnerability check - agent-gateway
        working-directory: services/agent-gateway
        run: govulncheck ./...

      - name: Go vulnerability check - api-gateway
        working-directory: services/api-gateway
        run: govulncheck ./...

      - name: Rust security audit - integration-service
        working-directory: services/integration-service
        run: cargo audit || true

      - name: Rust security audit - data-service
        working-directory: services/data-service
        run: cargo audit || true

      - name: Rust security audit - asset-service
        working-directory: services/asset-service
        run: cargo audit || true

      - name: Rust security audit - ops-service
        working-directory: services/ops-service
        run: cargo audit || true

      - name: Rust security audit - governance-service
        working-directory: services/governance-service
        run: cargo audit || true

      - name: Rust security audit - rationalization-service
        working-directory: services/rationalization-service
        run: cargo audit || true
